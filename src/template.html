<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo app</title>
</head>

<body>
    <aside>
        <h2>Projects</h2>
        <img src="./assets/icons/add-icon.svg" alt="Button to create new todo" class="add-project-btn">
        <div class="projects-list">
            <div class="project-item" data-project="My ToDos">
                <div class="project-name">My ToDos</div>
                <div class="project-count">5</div>
            </div>

            <div class="project-item" data-project="Work">
                <div class="project-name">Work</div>
                <div class="project-count">0</div>
            </div>
        </div>
    </aside>
    <main>
        <h1 class="main-heading">All</h1>
        <img src="./assets/icons/add-icon.svg" alt="Button to create new todo" class="add-todo-btn">
        <div class="todo-list"></div>
    </main>
    <div class="overlay"></div>
    <form class="task-form">
        <label class="task-form-title">
            Title
            <input name="task-form-title" type="text" autofocus autocomplete="off" required>
        </label>

        <label class="task-form-due-date">
            Due Date
            <input name="task-form-due-date" type="date" required>
        </label>

        <label class="task-form-priority">
            Priority
            <select name="task-form-priority">
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
            </select>
        </label>

        <label class="task-form-description">
            Description
            <textarea name="task-form-description" id="task-form-description">
            </textarea>
        </label>

        <button class="task-form-btn" type="submit">Add Task</button>
    </form>
</body>

</html>
